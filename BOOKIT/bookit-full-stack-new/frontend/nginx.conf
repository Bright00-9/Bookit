server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip text-based assets - meaningfully shrinks the JS bundle over the wire.
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Cache hashed build assets aggressively - Vite fingerprints filenames
    # (e.g. index-D64VDMd1.js), so a new deploy naturally busts the cache
    # via a new filename, making long cache lifetimes safe.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback: any route not matching a real file (e.g. /admin/slots
    # on a hard refresh) serves index.html, letting React Router take over
    # client-side instead of Nginx 404ing on routes that only exist in JS.
    location / {
        try_files $uri $uri/ /index.html;
    }

    location /health/live {
        access_log off;
        return 200 'ok';
        add_header Content-Type text/plain;
    }
}
